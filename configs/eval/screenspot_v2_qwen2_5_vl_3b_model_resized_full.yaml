evaluation:
  name: screenspot_v2_qwen2_5_vl_3b_model_resized_full
  description: Full ScreenSpot-v2 held-out evaluation with Qwen-first model-resized coordinate refinement.

dataset:
  hf_dataset_id: lscpku/ScreenSpot-v2
  split: test
  max_samples: null
  start_index: 0
  end_index: null
  indices_json: null

