evaluation:
  name: screenspot_v2_public_qwen2_5_vl_3b_point_baseline
  description: Plain public Qwen2.5-VL-3B point-prediction baseline on ScreenSpot-v2 under repo evaluation.

dataset:
  hf_dataset_id: lscpku/ScreenSpot-v2
  split: test
  max_samples: null
  start_index: 0
  end_index: null
  indices_json: null

model:
  backbone: qwen2_5_vl_3b
  adapter: qwen_public_point_json
  device: cuda
  torch_dtype: bfloat16
  attn_implementation: sdpa
  gpu_memory_utilization: 0.7
  max_new_tokens: 128
  temperature: 0.0
  min_pixels: 65536
  max_pixels: 524288
  coordinate_frame: model_resized

output:
  output_dir: outputs/screenspot_v2_public_qwen2_5_vl_3b_point_baseline

runtime:
  seed: 42
  log_every: 50
