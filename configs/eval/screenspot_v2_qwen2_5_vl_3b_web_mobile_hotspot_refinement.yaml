evaluation:
  name: screenspot_v2_qwen2_5_vl_3b_web_mobile_hotspot_refinement
  description: Same-protocol Qwen point-first refinement with web/mobile hotspot-center prompt wording.

dataset:
  hf_dataset_id: lscpku/ScreenSpot-v2
  split: test
  max_samples: null
  start_index: 0
  end_index: null
  indices_json: null

model:
  backbone: qwen2_5_vl_3b
  adapter: qwen_structured_json
  device: cuda
  torch_dtype: bfloat16
  attn_implementation: sdpa
  gpu_memory_utilization: 0.7
  max_new_tokens: 256
  temperature: 0.0
  min_pixels: 65536
  max_pixels: 524288
  coordinate_frame: model_resized
  point_first_prompt: true
  web_mobile_hotspot_prompt: true
  edge_click_interior_threshold: 0.2
  edge_click_interior_position: 0.45

output:
  output_dir: outputs/screenspot_v2_eval_qwen2_5_vl_3b_web_mobile_hotspot_refinement

runtime:
  seed: 42
  log_every: 50
