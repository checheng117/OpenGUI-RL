experiment:
  name: mind2web_stageA_qwen2_5_vl_3b_sft
  stage: A
  description: Real Qwen-first Mind2Web supervised baseline with LoRA fine-tuning.

model:
  backend: qwen2_5_vl_3b
  backbone: qwen2_5_vl_3b
  torch_dtype: bfloat16
  attn_implementation: sdpa
  gpu_memory_utilization: 0.7
  min_pixels: 65536
  max_pixels: 524288

data:
  split_mode: single_split_holdout
  val_ratio: 0.15
  train:
    split: train
    max_samples: 120
    cache_screenshots: true
  eval:
    split: train
    max_samples: 120
    cache_screenshots: true

training:
  output_dir: outputs/mind2web_stageA_sft
  num_epochs: 1
  max_steps: 40
  batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  logging_steps: 5
  eval_steps: 10
  save_steps: 20
  seed: 42
  device: cuda
  num_workers: 0
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  gradient_checkpointing: true

wandb:
  enabled: false
  project: gui-grounding
  run_name: mind2web-stageA-qwen2-5-vl-3b-sft
