experiment:
  name: reranker_clip_grid_stage5
  stage: B
  description: Learned reranker over CLIP-grid model-based candidates

data:
  candidates_path: outputs/candidate_generation_clip_grid/candidates_train.jsonl

reranker_model:
  input_dim: 17
  hidden_dim: 64
  dropout: 0.1

training:
  output_dir: outputs/reranker_clip_grid
  num_epochs: 20
  batch_size: 64
  learning_rate: 1.0e-3
  weight_decay: 0.0
  margin: 0.0
  val_ratio: 0.25
  min_reward_diff: 1.0e-6
  num_workers: 0
  device: auto
  seed: 42
