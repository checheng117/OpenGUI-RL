experiment:
  name: mind2web_stageB_reranker_qwen_conditional_singleton_recovery
  stage: B.8
  description: Learned reranker with conditional singleton recovery supervision on the preserved Mind2Web Stage-B pools.

data:
  candidates_path: outputs/mind2web_stageB_candidates_headroom_expanded/train/candidates_train.jsonl

reranker_model:
  input_dim: 84
  hidden_dim: 96
  dropout: 0.1

training:
  output_dir: outputs/mind2web_stageB_reranker_conditional_singleton_recovery
  num_epochs: 20
  batch_size: 64
  learning_rate: 5.0e-4
  weight_decay: 1.0e-4
  margin: 0.0
  val_ratio: 0.2
  min_reward_diff: 1.0e-6
  num_workers: 0
  device: cpu
  seed: 42
  export_preference_pairs: true
  pair_construction_mode: conditional_singleton_recovery
  pair_weight_mode: rare_recovery_targeted
  sample_split_mode: headroom_source_stratified
  sample_split_protected_sources:
    - point_first_sampled_t0p7
  feature_include_structured_relative_support: false
  pair_reward_gap_threshold: 0.0
  pair_weight_alpha: 1.5
  pair_weight_cap: 16.0
  pair_source_decoy_max_sources: 3
  pair_recovery_anchor_weight: 2.0
  pair_positive_ranking_weight: 1.25
  pair_source_decoy_weight: 1.6
  pair_same_source_decoy_weight: 1.8
  pair_cross_source_bonus: 0.10
  pair_source_prior_bonus: 0.0
  pair_pool_gap_bonus: 0.80
  pair_rare_source_bonus: 1.5
  pair_rare_signature_bonus: 2.5
  pair_negative_strength_bonus: 1.5
  pair_point_first_bonus: 0.75
  pair_point_first_support_anchor_weight: 1.5
  pair_disagreement_bonus: 0.5
  pair_positive_signal_bonus: 1.0
  pair_point_first_all_structured_decoys: false
  pair_conditional_singleton_bonus: 0.75
  pair_point_first_signal_threshold: 0.05
  pair_point_first_gap_threshold: 0.02
  pair_structured_singleton_signal_threshold: 1.20
  pair_structured_singleton_gap_threshold: 0.35
  pair_structured_singleton_decoy_weight: 2.1
  pair_structured_singleton_support_anchor_weight: 1.8
  checkpoint_selection_mode: headroom_then_full

evaluation:
  candidate_paths:
    test_task: outputs/mind2web_stageB_candidates_headroom_expanded/test_task/candidates_test_task.jsonl
    test_website: outputs/mind2web_stageB_candidates_headroom_expanded/test_website/candidates_test_website.jsonl
    test_domain: outputs/mind2web_stageB_candidates_headroom_expanded/test_domain/candidates_test_domain.jsonl
