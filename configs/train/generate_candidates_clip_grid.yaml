experiment:
  name: candidate_generation_clip_grid_stagea
  stage: B
  description: Model-based top-k candidate export from Stage-A CLIP-grid checkpoint

model:
  backend: clip_grid_stagea
  backbone: openai/clip-vit-base-patch32
  checkpoint: outputs/sft_clip_grid_debug_rerun/checkpoint-best
  grid_rows: 4
  grid_cols: 6
  hidden_dim: 256
  dropout: 0.1
  freeze_backbone: true
  device: auto

candidate_generation:
  backend: clip_grid_stagea
  top_k: 6
  top_action_k: 4
  top_grid_k: 8

reward:
  weights:
    element_correct: 1.0
    iou: 0.5
    click_inside_target: 0.3
    action_type_correct: 0.2
    invalid_format_penalty: 0.5

data:
  train:
    split: train
    max_samples: 12
    cache_screenshots: true

output:
  output_dir: outputs/candidate_generation_clip_grid
  candidates_jsonl: candidates_train.jsonl
  flat_candidates_jsonl: candidates_train_flat.jsonl
  summary_json: summary_train.json

training:
  seed: 42
