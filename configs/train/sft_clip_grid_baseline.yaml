experiment:
  name: sft_clip_grid_baseline
  stage: A
  description: Practical Stage-A CLIP-grid supervised baseline

model:
  backend: clip_grid_legacy
  backbone: openai/clip-vit-base-patch32
  grid_rows: 4
  grid_cols: 6
  hidden_dim: 512
  dropout: 0.1
  freeze_backbone: true

data:
  split_mode: single_split_holdout
  val_ratio: 0.1
  train:
    split: train
    max_samples: 2000
    cache_screenshots: true
  eval:
    split: train
    max_samples: 2000
    cache_screenshots: true

training:
  output_dir: outputs/sft_clip_grid_baseline
  num_epochs: 3
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  save_steps: 100
  eval_steps: 50
  logging_steps: 10
  seed: 42
  num_workers: 0
  device: auto
  loss_weights:
    action: 1.0
    grid: 1.0

wandb:
  enabled: true
  project: gui-grounding
  run_name: sft-clip-grid-baseline
