# Stage C option 2: Lightweight GRPO / contextual bandit
experiment:
  name: grpo_light
  stage: C
  description: Group relative policy optimization on top-k candidates

model:
  config: configs/model/qwen2_vl_2b.yaml
  sft_checkpoint: outputs/sft_baseline/checkpoint-best

grpo:
  group_size: 8       # K candidates per sample
  clip_eps: 0.2       # PPO-style clipping
  temperature: 1.0    # sampling temperature for candidate generation
  normalize_advantages: true

reward:
  weights:
    element_correct: 1.0
    iou: 0.5
    click_inside_target: 0.3
    action_type_correct: 0.2
    invalid_format_penalty: 0.5

data:
  train:
    config: configs/data/mind2web.yaml
    split: train
  eval:
    config: configs/data/mind2web.yaml
    split: test_task

training:
  output_dir: outputs/grpo
  num_iterations: 100
  batch_size: 4
  learning_rate: 1.0e-5
  seed: 42

wandb:
  enabled: false
  project: gui-grounding
  run_name: grpo-light
