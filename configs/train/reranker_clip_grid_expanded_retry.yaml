experiment:
  name: reranker_clip_grid_stage5b_expanded_retry
  stage: B
  description: Learned reranker retry on expanded CLIP-grid candidate pool

data:
  candidates_path: outputs/candidate_generation_clip_grid_expanded/candidates_train_expanded.jsonl

reranker_model:
  input_dim: 17
  hidden_dim: 128
  dropout: 0.1

training:
  output_dir: outputs/reranker_clip_grid_expanded_retry
  num_epochs: 30
  batch_size: 128
  learning_rate: 5.0e-4
  weight_decay: 0.0
  margin: 0.0
  val_ratio: 0.25
  min_reward_diff: 1.0e-4
  num_workers: 0
  device: auto
  seed: 42
