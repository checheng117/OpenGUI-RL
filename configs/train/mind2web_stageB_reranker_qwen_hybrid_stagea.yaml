experiment:
  name: mind2web_stageB_reranker_qwen_hybrid_stagea
  stage: B.5
  description: Lightweight learned reranker retrained on rebuilt hybrid-Stage-A Mind2Web Stage-B candidate pools.

data:
  candidates_path: outputs/mind2web_stageB_candidates_hybrid_stagea/train/candidates_train.jsonl

reranker_model:
  input_dim: 93
  hidden_dim: 96
  dropout: 0.1

training:
  output_dir: outputs/mind2web_stageB_reranker_hybrid_stagea
  num_epochs: 20
  batch_size: 64
  learning_rate: 5.0e-4
  weight_decay: 1.0e-4
  margin: 0.0
  val_ratio: 0.2
  min_reward_diff: 1.0e-6
  num_workers: 0
  device: cpu
  seed: 42
  export_preference_pairs: true
  pair_construction_mode: recovery_source_aware
  pair_weight_mode: source_aware_recovery
  sample_split_mode: headroom_source_stratified
  pair_reward_gap_threshold: 0.0
  pair_weight_alpha: 3.0
  pair_weight_cap: 8.0
  pair_source_decoy_max_sources: 3
  pair_recovery_anchor_weight: 1.75
  pair_positive_ranking_weight: 1.35
  pair_source_decoy_weight: 1.20
  pair_cross_source_bonus: 0.15
  pair_source_prior_bonus: 0.25
  pair_pool_gap_bonus: 0.75
  checkpoint_selection_mode: headroom_then_full

evaluation:
  candidate_paths:
    test_task: outputs/mind2web_stageB_candidates_hybrid_stagea/test_task/candidates_test_task.jsonl
    test_website: outputs/mind2web_stageB_candidates_hybrid_stagea/test_website/candidates_test_website.jsonl
    test_domain: outputs/mind2web_stageB_candidates_hybrid_stagea/test_domain/candidates_test_domain.jsonl
